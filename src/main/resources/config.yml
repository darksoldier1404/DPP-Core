Settings:
  # Global Language setting for the all DP-Plugins.
  Lang: en_US

  prefix: "&f[ &bDPP-Core &f] "

  # Economy backend used by MoneyAPI for all DP-Plugins.
  # AUTO        - Use EssentialsX if installed, otherwise fall back to Vault.
  # EssentialsX - Force EssentialsX (falls back to Vault if not installed).
  # Vault       - Force Vault (falls back to EssentialsX if not installed).
  economy-provider: AUTO

  DInventory: # Settings for the shared DInventory paging system.
    # The default page tool bar (the bottom row of paged inventories) is fully editable in-game.
    # Run "/dppcdi edit" to open a GUI editor where you can place any items in the 9 tool slots
    # and assign each one a function, then save. Saving writes the layout under
    # "defaultPageTools.slots" below; until then the classic arrangement (prev=1, current=4, next=7)
    # is used.
    #
    # Each saved slot stores an "item" (the serialized ItemStack shown) and a "role":
    #   DECORATION - clicks are cancelled, no action (filler).
    #   PREV       - moves to the previous page.
    #   NEXT       - moves to the next page.
    #   CURRENT    - shows the current page; {current} / {total} in the item name are replaced
    #                with the 1-based page numbers.
    #
    # defaultPageTools:
    #   slots:
    #     '1': { role: PREV, item: ... }
    #     '4': { role: CURRENT, item: ... }
    #     '7': { role: NEXT, item: ... }
    #
    # Legacy per-type appearance overrides set via "/dppcdi setdefaultpagetoolitem <TYPE>" remain
    # supported as the appearance of the classic arrangement when no GUI layout has been saved.
    # defaultPageToolItem:
    #   PANE: ...
    #   NEXT: ...
    #   PREV: ...
    #   CURRENT: ...

  Log: # Settings for DP-Plugins logging system.
    save_period: 3600  # Time in seconds to save the log file.
    save_integrated: true  # If true, integrated logs will be saved in a single file.
    save_separated: true  # If true, separated logs will be saved in individual files at each plugin folder.
    print_ConfigUtils_Debug: true  # If true, ConfigUtils debug messages will be printed to the console.
    print_Command_Debug: false  # If true, Command debug messages will be printed to the console.
    print_DInventory_Debug: false  # If true, DInventory debug messages will be printed to the console.
    print_DataContainer_Debug: true  # If true, DataContainer debug messages will be printed to the console.
    print_PluginUtils_Debug: true  # If true, PluginUtils debug messages will be printed to the console.